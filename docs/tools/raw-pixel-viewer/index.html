        return aw / ah;
      }

      function readGuessOptions() {
        return {
          dimMode: guessDimModeSelect.value,
          aspect: guessAspectSelect.value,
          widths: parseGuessWidths(guessWidthsInput.value),
          testYuv: !!guessYuvInput.checked,
          testRgb: !!guessRgbInput.checked,
          testBayer: !!guessBayerInput.checked,
          bayerBothEndians: !!guessBayerEndianBothInput.checked
        };
      }

      function buildGuessDimensions(base, opts) {
        const dims = [];
        const seen = new Set();
        const addDim = (w, h) => {
          const ww = clampInt(w, 0, 1);
          const hh = clampInt(h, 0, 1);
          const key = `${ww}x${hh}`;
          if (!seen.has(key)) {
            seen.add(key);
            dims.push([ww, hh]);
          }
        };

        const ratio = parseGuessAspect(opts.aspect, base);
        const includeCurrent = opts.dimMode === "current_only" || opts.dimMode === "current_swap" || opts.dimMode === "current_and_standards";
        const includeSwap = opts.dimMode === "current_swap";
        const includeStandards = opts.dimMode === "standards_only" || opts.dimMode === "current_and_standards";

        if (includeCurrent) {
          addDim(base.width, base.height);
        }
        if (includeSwap && base.width !== base.height) {
          addDim(base.height, base.width);
        }
        if (includeStandards) {
          for (const w of opts.widths) {
            const h = Math.max(1, Math.round(w / ratio));
            addDim(w, h);
          }
        }
        if (dims.length === 0) {
          addDim(base.width, base.height);
        }
        return dims;
      }

      function buildGuessCandidates(slot, opts) {
        const base = slot.settings;
        const dims = buildGuessDimensions(base, opts);
        const yuvFormats = ["nv12", "nv21", "nv16", "uyvy", "yuyv", "i420"];
        const rgbFormats = ["rgb24", "rgba32"];
        const bayerPatterns = ["RGGB", "BGGR", "GRBG", "GBRG"];
        const bayerEndians = opts.bayerBothEndians ? ["little", "big"] : [base.byteOrder];
        const bayerDepths = [...new Set([base.bayerBitDepth, 10, 12])].filter((x) => x >= 8 && x <= 16);
        const candidates = [{ ...base }];
        const wantsAny = opts.testYuv || opts.testRgb || opts.testBayer;
        const enableYuv = wantsAny ? opts.testYuv : true;
        const enableRgb = wantsAny ? opts.testRgb : true;
        const enableBayer = wantsAny ? opts.testBayer : true;

        for (const [w, h] of dims) {
          if (enableYuv) {
            for (const fmt of yuvFormats) {
              candidates.push({ ...base, width: w, height: h, format: fmt });
            }
          }
          if (enableRgb) {
            for (const fmt of rgbFormats) {
              candidates.push({ ...base, width: w, height: h, format: fmt });
            }
          }
          if (enableBayer) {
            for (const patt of bayerPatterns) {
              for (const endian of bayerEndians) {
                candidates.push({ ...base, width: w, height: h, format: "bayer10mipi", bayerPattern: patt, byteOrder: endian, bayerBitDepth: 10 });
                candidates.push({ ...base, width: w, height: h, format: "bayer12mipi", bayerPattern: patt, byteOrder: endian, bayerBitDepth: 12 });
                for (const depth of bayerDepths) {
                  candidates.push({ ...base, width: w, height: h, format: "bayer16", bayerPattern: patt, bayerBitDepth: depth, byteOrder: endian });
                }
              }
            }
          }
        }

        const seen = new Set();
        const ranked = [];
        for (const c of candidates) {
          const k = candidateKey(c);
          if (seen.has(k)) continue;
          seen.add(k);
          const expected = estimateBytes(c);
          if (expected <= 0) continue;
          const ratio = slot.bytes.length / expected;
          const score = Math.abs(Math.log2(Math.max(1e-9, ratio)));
          ranked.push({ c, score });
        }

        ranked.sort((a, b) => a.score - b.score);
        const maxCandidates = Math.max(96, dims.length * 24);
        return ranked.slice(0, maxCandidates).map((x) => x.c);
      }

      async function runGuessMode() {
        const slot = slots[activeSlot];
        if (!slot.bytes || guessRunning) return;

        guessRunning = true;
        guessBtn.disabled = true;
        guessRunBtn.disabled = true;
        guessBtn.textContent = "Guessing...";
        guessGrid.innerHTML = "";
        setGuessOverlayVisible(true);

        try {
          const opts = readGuessOptions();
          const dims = buildGuessDimensions(slot.settings, opts);
          const candidates = buildGuessCandidates(slot, opts);
          guessInfo.textContent =
            `Rendering ${candidates.length} candidates (${dims.length} dimensions) for slot ${activeSlot + 1}. ` +
            `Click one to apply or close to keep current settings.`;

          for (const candidate of candidates) {
            await new Promise((resolve) => requestAnimationFrame(resolve));

            const card = document.createElement("button");
            card.type = "button";
            card.className = "guess-card";

            const label = document.createElement("div");
            label.className = "guess-label";
            label.textContent = settingsLabel(candidate);

            try {
              const decoded = decodeFrame(slot.bytes, candidate);
              const thumb = document.createElement("canvas");
              thumb.width = 320;
              thumb.height = 200;
              const tctx = thumb.getContext("2d");
              tctx.fillStyle = "#0b1017";
              tctx.fillRect(0, 0, thumb.width, thumb.height);
              tctx.imageSmoothingEnabled = false;
              const scale = Math.min(thumb.width / decoded.width, thumb.height / decoded.height);
              const dw = Math.max(1, decoded.width * scale);
              const dh = Math.max(1, decoded.height * scale);
              const dx = (thumb.width - dw) * 0.5;
              const dy = (thumb.height - dh) * 0.5;
              tctx.drawImage(decoded.canvas, dx, dy, dw, dh);

              card.append(thumb, label);
              card.addEventListener("click", () => applyGuessCandidate(candidate));
            } catch (err) {
              const errorLabel = document.createElement("div");
              errorLabel.className = "guess-label";
              errorLabel.textContent = `${settingsLabel(candidate)} (decode fail)`;
              card.append(errorLabel);
            }

            guessGrid.append(card);
          }
        } finally {
          guessRunning = false;
          guessBtn.disabled = false;
          guessRunBtn.disabled = false;
          guessBtn.textContent = "Guess Format (Overlay)";
        }
      }

      function attachEvents() {
        for (let i = 0; i < slotButtons.length; i += 1) {
          slotButtons[i].addEventListener("click", () => setActiveSlot(i));
        }

        profileSelect.addEventListener("change", () => {
          if (syncingControls) return;
          const slot = slots[activeSlot];
          applyProfile(profileSelect.value, slot);
          invalidateSlot(slot);
          syncControlsFromSlot();
          updateStatus();
          scheduleRender();
        });

        loadBtn.addEventListener("click", () => fileInput.click());
        fileInput.addEventListener("change", async (ev) => {
          const file = ev.target.files && ev.target.files[0];
          if (!file) return;
          await loadFileToActiveSlot(file);
          fileInput.value = "";
        });

        fitBtn.addEventListener("click", () => {
          const decoded = getRenderTarget().decoded;
          if (!decoded) return;
          fitViewToImage(decoded);
          scheduleRender();
        });
        diffBtn.addEventListener("click", () => {
          setDiffMode(!diffMode);
        });
        saveBtn.addEventListener("click", () => {
          saveCurrentImage();
        });

        resetViewBtn.addEventListener("click", () => {
          resetView();
        });

        guessBtn.addEventListener("click", () => {
          runGuessMode();
        });
        guessRunBtn.addEventListener("click", () => {
          runGuessMode();
        });
        guessCloseBtn.addEventListener("click", () => {
          setGuessOverlayVisible(false);
        });
        const guessOptionControls = [
          guessDimModeSelect,
          guessAspectSelect,
          guessWidthsInput,
          guessYuvInput,
          guessRgbInput,
          guessBayerInput,
          guessBayerEndianBothInput
        ];
        for (const control of guessOptionControls) {
          control.addEventListener("keydown", (ev) => {
            if (ev.key === "Enter" && guessOverlay.classList.contains("open")) {
              runGuessMode();
            }
          });
        }
        saveProfileBtn.addEventListener("click", () => {
          saveCurrentProfile();
        });
        deleteProfileBtn.addEventListener("click", () => {
          deleteSelectedSavedProfile();
        });

        const controls = [
          formatSelect,
          widthInput,
          heightInput,
          offsetInput,
          stride0Input,
          stride1Input,
          stride2Input,
          byteOrderSelect,
          bayerBitDepthSelect,
          colorSpaceSelect,
          treatLinearInput,
          demosaicInput,
          swapUVInput,
          swapRBInput,
          bayerPatternSelect
        ];

        for (const control of controls) {
          control.addEventListener("input", readControlsToActiveSlot);
          control.addEventListener("change", readControlsToActiveSlot);
        }

        window.addEventListener("resize", scheduleRender);

        viewerCanvas.addEventListener("wheel", onWheel, { passive: false });
        viewerCanvas.addEventListener("mousedown", beginPan);
        window.addEventListener("mousemove", onMouseMove);
        window.addEventListener("mouseup", endPan);
        viewerCanvas.addEventListener("mouseleave", () => {
          pointerX = -1;
          pointerY = -1;
          scheduleRender();
        });
        viewerCanvas.addEventListener("mouseenter", onMouseMove);

        canvasWrap.addEventListener("dragover", (ev) => {
          ev.preventDefault();
        });

        canvasWrap.addEventListener("drop", async (ev) => {
          ev.preventDefault();
          if (!ev.dataTransfer || !ev.dataTransfer.files || !ev.dataTransfer.files[0]) return;
          await loadFileToActiveSlot(ev.dataTransfer.files[0]);
        });

        window.addEventListener("keydown", (ev) => {
          const target = ev.target;
          if (target instanceof HTMLElement) {
            const tag = target.tagName.toLowerCase();
            if (tag === "input" || tag === "select" || tag === "textarea") return;
          }

          if (ev.key === "1") {
            setActiveSlot(0);
          } else if (ev.key === "2") {
            setActiveSlot(1);
          } else if (ev.key === "3") {
            setActiveSlot(2);
          } else if (ev.key === "4") {
            setActiveSlot(3);
          } else if (ev.key === "f" || ev.key === "F") {
            const decoded = getRenderTarget().decoded;
            if (decoded) {
              fitViewToImage(decoded);
              scheduleRender();
            }
          } else if (ev.key === "0") {
            setDiffMode(!diffMode);
          } else if (ev.key === "Escape") {
            setGuessOverlayVisible(false);
          }
        });
      }

      function init() {
        savedProfiles = loadSavedProfiles();
        rebuildProfileSelect();
        populateFormats();
        attachEvents();
        syncControlsFromSlot();
        updateSlotButtons();
        updateDiffButtonState();
        updateStatus();
        scheduleRender();
      }

      init();
    })();
  </script>
</body>
</html>
